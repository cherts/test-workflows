name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - "*"
  #schedule:
    # Daily at 07:13
    #- cron: '13 7 * * *'

jobs:
  test:
    name: ${{ matrix.task.name }} ${{ matrix.os.name }} ${{ matrix.postgres.name }} ${{ matrix.pgbouncer.name }}
    runs-on: ${{ matrix.os.runs-on }}
    container: ${{ matrix.os.container[matrix.postgres.postgres] }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux
            runs-on: ubuntu-latest
            matrix: linux
            container:
              10: docker://postgres:10-alpine
              11: docker://postgres:11-alpine
              12: docker://postgres:12-alpine
              13: docker://postgres:13-alpine
              14: docker://postgres:14-alpine
              15: docker://postgres:15-alpine
              16: docker://postgres:16-alpine
              17: docker://postgres:17-alpine
              18: docker://postgres:18-alpine
          - name: Windows
            runs-on: windows-latest
            matrix: windows
          - name: macOS
            runs-on: macos-latest
            matrix: macos
        postgres:
          - name: PostgreSQL v10
            postgres: 10.23
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v11
            postgres: 11.22
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v12
            postgres: 12.22
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v13
            postgres: 13.23
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v14
            postgres: 14.22
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v15
            postgres: 15.17
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v16
            postgres: 16.13
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v17
            postgres: 17.9
            pgbouncer: 1.25.1
            golang: 1.26.0
          - name: PostgreSQL v18
            postgres: 18.3
            pgbouncer: 1.25.1
            golang: 1.26.0
        task:
          - name: Version
            tox: core
          - name: Twisted
            tox: twisted
          - name: asyncio
            tox: asyncio
#        exclude:
#          - postgres:
#              matrix: 18.2
#          - os:
#              matrix: windows
    steps:
      - uses: actions/checkout@v6
      - name: Set up ${{ matrix.postgres.name }}
        if: job.container == ''
        run: |
          echo "Set up ${{ matrix.postgres.name }}"
      - name: Install Linux pgbouncer dependencies
        if: matrix.os.matrix == 'linux'
        run: |
          apt-get update --yes
          apt-get install --yes pgbouncer
      - name: Version
        run: |
          pgbouncer --version
          postgres --version
  build:
    name: ${{ matrix.task.name }} ${{ matrix.os.name }} ${{ matrix.postgres.name }}
    runs-on: ${{ matrix.os.runs-on }}
    container: ${{ matrix.os.container[matrix.postgres.postgres] }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux
            runs-on: ubuntu-latest
            matrix: linux
            container:
              18: docker://postgres:18-alpine
        postgres:
          - name: PostgreSQL v18
            postgres: 18.3
            pgbouncer: 1.25.1
            golang: 1.26.0
    steps:
      - uses: actions/checkout@v6
      - name: Run setup ${{ matrix.postgres.golang }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.postgres.golang }}
      - name: Install Linux pgbouncer dependencies
        if: matrix.os.matrix == 'linux'
        run: |
          apt-get update --yes
          apt-get install --yes pgbouncer
      - name: Version
        run: |
          go version
          pgbouncer --version
          postgres --version
  maybe_publish:
    name: Maybe Publish
    runs-on: ubuntu-latest
    container: docker://postgres:18-alpine
    needs:
      - test
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Maybe publish
        run: |
          echo "Maybe publish"
        env:
          PG_USERNAME: ${{ secrets.PG_USERNAME }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
  all:
    name: All
    runs-on: ubuntu-latest
    needs:
      - test
      - build
      - maybe_publish
    steps:
      - name: This
        run: |
          echo "All this"