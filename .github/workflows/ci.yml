name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - "*"
  #schedule:
    # Daily at 07:13
    #- cron: '13 7 * * *'

jobs:
  test:
    name: ${{ matrix.task.name }} ${{ matrix.os.name }} ${{ matrix.postgres.name }} ${{ matrix.pgbouncer.name }}
    runs-on: ${{ matrix.os.runs-on }}
    container: ${{ matrix.os.container[matrix.postgres.postgres] }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux
            runs-on: ubuntu-latest
            matrix: linux
            container:
              10: docker://postgres:10
              11: docker://postgres:11
              12: docker://postgres:12
              13: docker://postgres:13
              14: docker://postgres:14
              15: docker://postgres:15
              16: docker://postgres:16
              17: docker://postgres:17
              18: docker://postgres:18
#          - name: Windows
#            runs-on: windows-latest
#            matrix: windows
#          - name: macOS
#            runs-on: macos-latest
#            matrix: macos
        postgres:
          - name: PostgreSQL v10
            postgres: 10
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v11
            postgres: 11
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v12
            postgres: 12
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v13
            postgres: 13
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v14
            postgres: 14
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v15
            postgres: 15
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v16
            postgres: 16
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v17
            postgres: 17
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v18
            postgres: 18
            pgbouncer: 1.25.1
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up ${{ matrix.postgres.name }}
        if: matrix.os.matrix == 'linux'
        run: |
          apt-get update
          apt-get -y upgrade
          echo "Set up ${{ matrix.postgres.pgbouncer }}"
          apt-get install build-essential wget vim make gcc git curl libevent-dev libssl-dev pkg-config python3 pandoc -y
          wget https://www.pgbouncer.org/downloads/files/${{ matrix.postgres.pgbouncer }}/pgbouncer-${{ matrix.postgres.pgbouncer }}.tar.gz
          tar xzf pgbouncer-${{ matrix.postgres.pgbouncer }}.tar.gz && cd pgbouncer-${{ matrix.postgres.pgbouncer }}  
          ./configure --prefix=/usr/local
          make
          make install
          echo "Set up ${{ matrix.postgres.golang }}"
          curl -s -L https://go.dev/dl/go${{ matrix.postgres.golang }}.linux-amd64.tar.gz -o - | tar xzf - -C /usr/local
          export PATH=$PATH:/usr/local:bin:/usr/local/sbin:/usr/local/go/bin
          echo "Set up ${{ matrix.postgres.revive }}"
          curl -s -L https://github.com/mgechev/revive/releases/download/v${{ matrix.postgres.revive }}/revive_linux_amd64.tar.gz | tar xzf - -C $(go env GOROOT)/bin revive
          echo "Set up ${{ matrix.postgres.gosec }}"
          curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b $(go env GOROOT)/bin v${{ matrix.postgres.gosec }}
          mkdir /opt/testing/
          rm -rf /var/lib/apt/lists/*
      - name: Version
        run: |
          go version
          pgbouncer --version
          postgres --version
  build:
    name: ${{ matrix.task.name }} ${{ matrix.os.name }} ${{ matrix.postgres.name }}
    runs-on: ${{ matrix.os.runs-on }}
    container: ${{ matrix.os.container[matrix.postgres.postgres] }}
    needs:
      - test
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux
            runs-on: ubuntu-latest
            matrix: linux
            container:
              18: docker://postgres:18
        postgres:
          - name: PostgreSQL v18
            postgres: 18.3
            pgbouncer: 1.25.1
            golang: 1.26.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run setup ${{ matrix.postgres.golang }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.postgres.golang }}
      - name: Install Linux pgbouncer dependencies
        if: matrix.os.matrix == 'linux'
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes pgbouncer
      - name: Version
        run: |
          go version
          pgbouncer --version
          postgres --version
  maybe_publish:
    name: Maybe Publish
    runs-on: ubuntu-latest
    container: docker://postgres:18
    needs:
      - test
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Maybe publish
        run: |
          echo "Maybe publish"
        env:
          PG_USERNAME: ${{ secrets.PG_USERNAME }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
  all:
    name: All
    runs-on: ubuntu-latest
    needs:
      - test
      - build
      - maybe_publish
    steps:
      - name: This
        run: |
          echo "All this"