name: CI

on:
  push:
    branches:
      - dev*
    tags:
      - v*
  pull_request:
    branches:
      - "main"
  #schedule:
    # Daily at 07:13
    #- cron: '13 7 * * *'

jobs:
  test:
    name: ${{ matrix.task.name }} ${{ matrix.os.name }} ${{ matrix.postgres.name }} ${{ matrix.pgbouncer.name }}
    runs-on: ${{ matrix.os.runs-on }}
    container: ${{ matrix.os.container[matrix.postgres.postgres] }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux
            runs-on: ubuntu-latest
            matrix: linux
            container:
              12: docker://postgres:12
              13: docker://postgres:13
              14: docker://postgres:14
              15: docker://postgres:15
              16: docker://postgres:16
              17: docker://postgres:17
              18: docker://postgres:18
#          - name: Windows
#            runs-on: windows-latest
#            matrix: windows
#          - name: macOS
#            runs-on: macos-latest
#            matrix: macos
        pgbouncer:
          - name: PgBouncer v1.25
            pgbouncer: 1.25.1
#          - name: PgBouncer v1.24
#            pgbouncer: 1.24.1
#          - name: PgBouncer v1.23
#            pgbouncer: 1.23.1
#          - name: PgBouncer v1.22
#            pgbouncer: 1.22.1
#          - name: PgBouncer v1.20
#            pgbouncer: 1.20.1
#          - name: PgBouncer v1.19
#            pgbouncer: 1.19.1
          - name: PgBouncer v1.18
            pgbouncer: 1.18.0
#          - name: PgBouncer v1.17
#            pgbouncer: 1.17.0
          - name: PgBouncer v1.16
            pgbouncer: 1.16.1
          - name: PgBouncer v1.15
            pgbouncer: 1.15.0
        postgres:
          - name: PostgreSQL v12
            postgres: 12
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v13
            postgres: 13
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v14
            postgres: 14
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v15
            postgres: 15
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v16
            postgres: 16
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v17
            postgres: 17
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
          - name: PostgreSQL v18
            postgres: 18
            golang: 1.26.0
            revive: 1.14.0
            gosec: 2.23.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up pgbouncer ${{ matrix.pgbouncer.pgbouncer }}
        if: matrix.os.matrix == 'linux'
        run: |
          apt-get update
          apt-get -y upgrade
          echo "Set up pgbouncer ${{ matrix.pgbouncer.pgbouncer }}"
          apt-get install build-essential wget vim make gcc git curl libevent-dev libssl-dev pkg-config python3 pandoc -y
          wget https://www.pgbouncer.org/downloads/files/${{ matrix.pgbouncer.pgbouncer }}/pgbouncer-${{ matrix.pgbouncer.pgbouncer }}.tar.gz
          tar xzf pgbouncer-${{ matrix.pgbouncer.pgbouncer }}.tar.gz
          cd pgbouncer-${{ matrix.pgbouncer.pgbouncer }}
          ./configure --prefix=/usr/local
          make
          mkdir /etc/pgbouncer /var/log/pgbouncer /var/run/pgbouncer
          chown -R postgres:postgres /etc/pgbouncer /var/log/pgbouncer /var/run/pgbouncer
          cp pgbouncer /usr/sbin
          cp etc/pgbouncer.ini /etc/pgbouncer
          export PATH=$PATH:/usr/local/bin:/usr/local/go/bin
          cd ..
          rm -f pgbouncer-${{ matrix.pgbouncer.pgbouncer }}.tar.gz
          rm -rf pgbouncer-${{ matrix.pgbouncer.pgbouncer }}
      - name: Set up golang ${{ matrix.postgres.golang }}
        if: matrix.os.matrix == 'linux'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.postgres.golang }}
      - name: Set up revive ${{ matrix.postgres.revive }}
        if: matrix.os.matrix == 'linux'
        run: |
          curl -s -L https://github.com/mgechev/revive/releases/download/v${{ matrix.postgres.revive }}/revive_linux_amd64.tar.gz | tar xzf - -C $(go env GOROOT)/bin revive
      - name: Set up gosec ${{ matrix.postgres.gosec }}
        if: matrix.os.matrix == 'linux'
        run: |
          curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b $(go env GOROOT)/bin v${{ matrix.postgres.gosec }}
      - name: Prepare testing environment
        if: matrix.os.matrix == 'linux'
        run: |
          mkdir /opt/testing
          chmod 755 /opt/testing
          rm -rf /var/lib/apt/lists/*
      - name: Version
        run: |
          go version
          pgbouncer --version
          postgres --version
      - name: Copy test environment script
        if: matrix.os.matrix == 'linux'
        run: |
          cp prepare-test-environment.sh /opt/testing/
          cp fixtures.sql /opt/testing/
      - name: Run tests with PostgreSQL ${{ matrix.postgres.postgres }} and PgBouncer ${{ matrix.pgbouncer.pgbouncer }}
        run: |
          /opt/testing/prepare-test-environment.sh ${{ matrix.postgres.postgres }}
  build:
    name: ${{ matrix.task.name }} ${{ matrix.os.name }} ${{ matrix.golang.name }}
    runs-on: ${{ matrix.os.runs-on }}
    container: ${{ matrix.os.container[matrix.golang.golang] }}
    needs:
      - test
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux
            runs-on: ubuntu-latest
            matrix: linux
            container:
              126: docker://golang:1.26.0
        golang:
          - name: Go
            golang: 1.26.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Version
        run: |
          go version
  publish:
    name: Publish
    runs-on: ubuntu-latest
    container: docker://golang:1.26.0
    needs:
      - test
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Publish
        run: |
          echo "Publishing this"
        env:
          PG_USERNAME: ${{ secrets.PG_USERNAME }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
  all:
    name: All
    runs-on: ubuntu-latest
    needs:
      - test
      - build
      - publish
    steps:
      - name: This
        run: |
          echo "All this"